<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BORDER RADIUS</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            margin: 10px;
            padding: 5px;
            border: 3px solid;
        }
        #first{
            background-color: deepskyblue;
            border-radius: 5px;
        }
        #second{
            background-color: springgreen;
            border-radius: 50%;
            text-align: center;
            
        }
        #second p{
            align-items: center;
            text-align: center;
            padding: 10px;            
        }
    </style>
</head>
<body>
    <div id="first" class="box">First</div>
    <div id="second" class="box"><p>Complete Circle</p></div>
</body>
</html>
