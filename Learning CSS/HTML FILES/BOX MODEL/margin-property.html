<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PADDING PROPERTY</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            height: 100px;
            width: 100px;
        }
        #first{
            background-color: steelblue;
            
            padding: 5px;
            margin: 5px;
        }
        #second{
            background-color: rgb(178, 7, 124);
             padding: 5px;
            margin: 5px;
        }
    </style>
</head>
<body>
     <div id="first" class="box">First</div>
     <div id="second" class="box">Second</div>
</body>
</html>
