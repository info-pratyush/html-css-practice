<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BORDER PROPERTY</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            height: 100px;
            width: 100px;
            padding: 5px;
            margin: 5px;
        }
        #first{
            background-color: steelblue;
            border: 2px solid;
        }
        #second{
            background-color: rgb(9, 113, 232);
            border: 5px crimson dotted;
        }
    </style>
</head>
<body>
     <div id="first" class="box">First</div>
     <div id="second" class="box">Second</div>
</body>
</html>
