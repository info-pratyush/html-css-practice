<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heading Groups</title>
</head>
<body>
     <hgroup>
 <h2>Japanese Vegetarian</h2>
 <h3>Five week course in London</h3>
     </hgroup>

      <p>The purpose of this 
element is to group together a 
set of one or more heading tags together
so that they are 
treated as one single heading. </p>
</body>
</html>
