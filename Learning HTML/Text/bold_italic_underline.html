<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bold, Italic and Underline Tags</title>
</head>
<body>
    <p>This is how we make a word appear <b>bold</b>.</p>
    

    <br><hr>
    <p>This is how we make a text appear <i>italic</i>.</p>
    <br><hr>
    <p>This is how we make a text appear <u>underline</u>.</p>
</body>
</html>
