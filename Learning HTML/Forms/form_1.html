<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Contact & Subscription Form</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; padding: 2rem; background:#f7f8fb; color:#111; }
    .container { max-width: 640px; margin: 0 auto; background:#fff; padding:1.25rem 1.5rem; border-radius:8px; box-shadow:0 6px 18px rgba(20,20,40,0.06); }
    form > * + * { margin-top: 0.75rem; }
    label { display:block; font-size:0.95rem; margin-bottom:0.25rem; }
    input[type="text"], input[type="tel"], input[type="email"], select {
      width:100%; padding:0.5rem 0.6rem; border:1px solid #d6d9df; border-radius:6px; font-size:1rem;
      box-sizing:border-box;
    }
    .row { display:flex; gap:0.75rem; }
    .row > * { flex:1; }
    .actions { display:flex; gap:0.5rem; margin-top:1rem; }
    button { padding:0.55rem 0.9rem; border-radius:6px; border:0; cursor:pointer; font-weight:600; }
    button[type="submit"] { background:#0078d4; color:#fff; }
    button[type="reset"] { background:#f1f3f5; color:#111; }
    .note { font-size:0.85rem; color:#555; margin-top:0.35rem; }
    .checkbox { display:flex; align-items:center; gap:0.5rem; }
  </style>
</head>
<body>
  <main class="container">
    <h1 style="margin:0 0 0.75rem 0; font-size:1.25rem;">Contact & Newsletter</h1>

    <form id="contactForm" action="#" method="post" novalidate>
      <div>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Full name" required />
      </div>

      <div class="row">
        <div>
          <label for="mobile">Mobile number</label>
          <input id="mobile" name="mobile" type="tel" inputmode="numeric"
                 placeholder="e.g. 9876543210"
                 pattern="[6-9][0-9]{9}"
                 title="Enter a 10-digit Indian mobile number starting with 6-9"
                 required />
          <div class="note">10 digits, starting with 6-9</div>
        </div>

        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="name@example.com" required />
        </div>
      </div>

      <div>
        <label for="state">State / Union Territory</label>
        <select id="state" name="state" required>
          <option value="" disabled selected>-- Select state or UT --</option>

          <!-- States -->
          <option>Andhra Pradesh</option>
          <option>Arunachal Pradesh</option>
          <option>Assam</option>
          <option>Bihar</option>
          <option>Chhattisgarh</option>
          <option>Goa</option>
          <option>Gujarat</option>
          <option>Haryana</option>
          <option>Himachal Pradesh</option>
          <option>Jharkhand</option>
          <option>Karnataka</option>
          <option>Kerala</option>
          <option>Madhya Pradesh</option>
          <option>Maharashtra</option>
          <option>Manipur</option>
          <option>Meghalaya</option>
          <option>Mizoram</option>
          <option>Nagaland</option>
          <option>Odisha</option>
          <option>Punjab</option>
          <option>Rajasthan</option>
          <option>Sikkim</option>
          <option>Tamil Nadu</option>
          <option>Telangana</option>
          <option>Tripura</option>
          <option>Uttar Pradesh</option>
          <option>Uttarakhand</option>
          <option>West Bengal</option>

          <!-- Union Territories -->
          <option>Andaman and Nicobar Islands</option>
          <option>Chandigarh</option>
          <option>Dadra and Nagar Haveli and Daman and Diu</option>
          <option>Delhi</option>
          <option>Jammu and Kashmir</option>
          <option>Ladakh</option>
          <option>Lakshadweep</option>
          <option>Puducherry</option>
        </select>
      </div>

      <div class="checkbox" style="margin-top:0.25rem;">
        <input id="subscribe" name="subscribe" type="checkbox" value="yes" />
        <label for="subscribe" style="margin:0;">Subscribe to newsletter</label>
      </div>

      <div class="actions">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
      </div>
    </form>
  </main>

  <script>
    // Basic client-side validation feedback
    document.getElementById('contactForm').addEventListener('submit', function (e) {
      if (!this.checkValidity()) {
        e.preventDefault();
        this.reportValidity();
      } else {
        // Replace with real submission handling
        e.preventDefault();
        alert('Form validated. Ready to submit to server.');
      }
    });
  </script>
</body>
</html></main>
