<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Down Box</title>
</head>
<body>
    <form action="">
        <p>Select Your Smart Phone Brand</p>
        <select name="brand" id="phone">

            <option value="vivo">Vivo</option>
        </select>
    </form>
</body>
</html>
