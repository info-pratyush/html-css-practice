<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanning Columns</title>
</head>
<body>
    <table border="1px">
        <caption>Spanning Columns</caption>
        <tr>
            <th></th>
            <th>8AM</th>
            <th>9AM</th>
            <th>10AM</th>
            <th>11AM</th>
        </tr>
        <tr>
            <th>Monday</th>
            <td>Geography</td>
            <td>Maths</td>
            <td>Art</td>
            <td>Physics</td>
            
            </tr>

        <tr>
            <th>Tuesday</th>
            <td colspan="3">Sports</td>
            <td>Chemistry</td>
        </tr>
    </table>
</body>
</html>
