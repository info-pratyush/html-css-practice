<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Structure</title>
</head>
<body>
    <h1>Table</h1>
    <p>Number Of Books In Each Subject</p>

    <table border="2px">
        <tr>
            <td>Physics</td>
            <td>Chemistry</td>
            <td>Mathematics</td>
        </tr>
        <tr>
            <td>5</td>
            <td>3</td>
            <td>7</td>
        </tr>

    </table>
</body>
</html>
