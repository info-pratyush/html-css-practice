<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Heading</title>
</head>
<body>
    <table>
        <tr>
            <th></th>
            <th scope="col"> Monday</th>
            <th scope="col"> Tuesday</th>
        </tr>

        <tr>
            <th scope="row"> Books Sold</th>
            <th> 120</th>
            <th>90</th>
        </tr>

        <tr>
            <th scope="row"> Total Sales</th>
            <th>$200</th>
            <th>$150</th>
        
        </tr>
    </table>
</body>
</html>
